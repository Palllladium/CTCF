<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    color: #333;
    padding: 12px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  h2 { font-size: 14px; margin-bottom: 8px; }
  .info { color: #666; margin-bottom: 8px; line-height: 1.4; }
  textarea {
    flex: 1;
    width: 100%;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  textarea:focus { border-color: #18A0FB; }
  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  button {
    flex: 1;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary {
    background: #18A0FB;
    color: #fff;
  }
  .btn-primary:hover { background: #0D8CE0; }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary {
    background: #eee;
    color: #333;
  }
  .btn-secondary:hover { background: #ddd; }
  .status {
    margin-top: 8px;
    font-size: 11px;
    color: #666;
    min-height: 16px;
  }
  .status.error { color: #E74C3C; }
  .status.ok { color: #27AE60; }
  .file-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .file-row input[type=file] { flex: 1; font-size: 11px; }
</style>
</head>
<body>
  <h2>CTCF Architecture Diagram</h2>
  <p class="info">
    Paste the JSON spec generated by <code>gen_architecture_figma.py</code>,
    or load it from a file. Then click <b>Create Diagram</b>.
  </p>

  <div class="file-row">
    <input type="file" id="fileInput" accept=".json">
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <textarea id="json" placeholder="Paste architecture_ctcf.json here..."></textarea>

  <div class="buttons">
    <button class="btn-primary" id="createBtn" onclick="create()">
      Create Diagram
    </button>
  </div>

  <div id="status" class="status"></div>

  <script>
    const textarea = document.getElementById('json');
    const status = document.getElementById('status');
    const createBtn = document.getElementById('createBtn');

    // File input handler
    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        textarea.value = ev.target.result;
        setStatus(`Loaded ${file.name} (${(file.size/1024).toFixed(1)} KB)`, 'ok');
      };
      reader.readAsText(file);
    });

    function setStatus(msg, cls) {
      status.textContent = msg;
      status.className = 'status' + (cls ? ' ' + cls : '');
    }

    function create() {
      const raw = textarea.value.trim();
      if (!raw) {
        setStatus('No JSON provided.', 'error');
        return;
      }
      try {
        JSON.parse(raw); // validate
      } catch (e) {
        setStatus('Invalid JSON: ' + e.message, 'error');
        return;
      }
      createBtn.disabled = true;
      setStatus('Creating diagram...');
      parent.postMessage({ pluginMessage: { type: 'create', json: raw } }, '*');
    }

    function clearAll() {
      textarea.value = '';
      setStatus('');
    }

    // Messages from plugin
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (!msg) return;
      createBtn.disabled = false;
      if (msg.type === 'done') {
        setStatus(`Done! Created ${msg.count} elements.`, 'ok');
      } else if (msg.type === 'error') {
        setStatus('Error: ' + msg.message, 'error');
      } else if (msg.type === 'progress') {
        setStatus(msg.message);
      }
    };
  </script>
</body>
</html>
